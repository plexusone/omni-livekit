site_name: omni-livekit Documentation
site_description: LiveKit provider for OmniMeet and OmniVoice
site_author: PlexusOne
site_url: https://plexusone.github.io/omni-livekit/

repo_name: plexusone/omni-livekit
repo_url: https://github.com/plexusone/omni-livekit

theme:
  name: material
  palette:
    - scheme: default
      primary: deep-purple
      accent: deep-purple
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: deep-purple
      accent: deep-purple
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.suggest
    - search.highlight
    - content.tabs.link
    - content.code.copy

plugins:
  - search

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences
  - admonition
  - pymdownx.details
  - pymdownx.tabbed:
      alternate_style: true
  - tables
  - toc:
      permalink: true

nav:
  - Home: index.md
  - Getting Started:
      - Installation: getting-started.md
      - Quick Start: quickstart.md
  - Guides:
      - Human Participation: guides/human-participation.md
      - Voice Agent: guides/voice-agent.md
      - OmniMeet Integration: guides/omnimeet-integration.md
  - API Reference:
      - Gateway: api/gateway.md
      - Room Client: api/room.md
      - Agent: api/agent.md

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/plexusone
