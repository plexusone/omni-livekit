site_name: omni-livekit Documentation
site_description: LiveKit provider for OmniMeet and OmniVoice
site_author: PlexusOne
site_url: https://plexusone.github.io/omni-livekit/

repo_name: plexusone/omni-livekit
repo_url: https://github.com/plexusone/omni-livekit

theme:
  name: material
  custom_dir: docs/overrides
  palette:
    # Dark mode first (PlexusOne default)
    - scheme: slate
      primary: custom
      accent: custom
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
    - scheme: default
      primary: custom
      accent: custom
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
  features:
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.highlight
    - content.code.copy

extra_css:
  - https://plexusone.dev/css/plexusone-mkdocs.css

plugins:
  - search

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences
  - admonition
  - pymdownx.details
  - pymdownx.tabbed:
      alternate_style: true
  - tables
  - toc:
      permalink: true

nav:
  - Home: index.md
  - Getting Started:
      - Installation: getting-started.md
      - Quick Start: quickstart.md
  - Guides:
      - Human Participation: guides/human-participation.md
      - Voice Agent: guides/voice-agent.md
      - OmniMeet Integration: guides/omnimeet-integration.md
  - Architecture:
      - Voice Pipeline: architecture/voice-pipeline.md
      - Static Image Avatar: architecture/avatar.md
  - API Reference:
      - Gateway: api/gateway.md
      - Room Client: api/room.md
      - Agent: api/agent.md
  - Releases:
      - Overview: releases/index.md
      - v0.1.0: releases/v0.1.0.md

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/plexusone
